# docker-compose.yml — Local development stack
# Mirrors the production environment (Qdrant as a standalone service).
#
# Usage:
#   docker compose up --build
#
# Then open http://localhost:7860 for the Streamlit UI
#      and http://localhost:8000/docs for the FastAPI Swagger UI.

version: "3.9"

services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: gitmind-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  api:
    build: .
    container_name: gitmind-api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      # Remote Qdrant (the service above)
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ""
      # SQLite for local dev (no Postgres needed)
      DATABASE_URL: ""
      DB_PATH: data/gitmind.db
      # Keys
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      API_KEY: ${API_KEY:-}
    volumes:
      - .:/app
      - app_data:/app/data
    depends_on:
      - qdrant
    restart: unless-stopped

  frontend:
    build: .
    container_name: gitmind-frontend
    command: >
      streamlit run interface/streamlit_app.py
        --server.port 7860
        --server.address 0.0.0.0
        --server.headless true
    ports:
      - "7860:7860"
    environment:
      GITMIND_API_URL: http://api:8000
      API_KEY: ${API_KEY:-}
    volumes:
      - .:/app
    depends_on:
      - api
    restart: unless-stopped

volumes:
  qdrant_storage:
  app_data:
